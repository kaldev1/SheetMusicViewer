<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Sheet Music Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    #open-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 24px;
    }
    #open-screen h1 { color: #fff; font-size: 24px; }
    #file-input { display: none; }
    #open-button {
      background: #fff; color: #000; border: none;
      padding: 16px 32px; font-size: 18px; border-radius: 12px;
      cursor: pointer; min-width: 200px; min-height: 56px;
    }
    #open-button:active { background: #ddd; }
    #viewer {
      display: none;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0; left: 0;
      background: #000;
    }
    #pdf-canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 100%;
      max-height: 100%;
      will-change: contents;
    }
    #page-indicator {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #page-indicator.visible { opacity: 1; }
    #close-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    #close-btn.visible { opacity: 1; }
    #close-btn:active { background: rgba(50,50,50,0.7); }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 18px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="open-screen">
    <h1>Sheet Music Viewer</h1>
    <input type="file" id="file-input" accept=".pdf">
    <button id="open-button">Open PDF</button>
  </div>

  <div id="viewer">
    <canvas id="pdf-canvas"></canvas>
  </div>

  <button id="close-btn" title="Close">X</button>

  <div id="page-indicator"></div>
  <div id="loading">Loading...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const fileInput = document.getElementById('file-input');
    const openButton = document.getElementById('open-button');
    const openScreen = document.getElementById('open-screen');
    const viewer = document.getElementById('viewer');
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const pageIndicator = document.getElementById('page-indicator');
    const loading = document.getElementById('loading');

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let generation = 0;
    const pageCache = new Map();
    const pendingRenders = new Map();
    const smallScorePageLimit = 8;
    const maxCachedPages = 12;

    function getCacheKey(pageNum) {
      return `${pageNum}:${window.innerWidth}x${window.innerHeight}`;
    }

    function trimPageCache() {
      if (totalPages <= smallScorePageLimit) return;
      if (pageCache.size <= maxCachedPages) return;

      const entries = [...pageCache.entries()]
        .sort((a, b) => Math.abs(a[1].pageNum - currentPage) - Math.abs(b[1].pageNum - currentPage));

      for (const [key, cached] of entries.slice(maxCachedPages)) {
        if (cached.source && cached.source.close) cached.source.close();
        pageCache.delete(key);
      }
    }

    async function renderPageToCache(pageNum) {
      if (!pdfDoc || pageNum < 1 || pageNum > totalPages) return null;

      const key = getCacheKey(pageNum);
      if (pageCache.has(key)) return pageCache.get(key);
      if (pendingRenders.has(key)) return pendingRenders.get(key);

      const renderGeneration = generation;
      const renderPromise = (async () => {
        const page = await pdfDoc.getPage(pageNum);
        if (renderGeneration !== generation) return null;

        const defaultViewport = page.getViewport({ scale: 1 });
        const scaleX = window.innerWidth / defaultViewport.width;
        const scaleY = window.innerHeight / defaultViewport.height;
        const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
        const cssScale = Math.min(scaleX, scaleY);
        const viewport = page.getViewport({ scale: cssScale * pixelRatio });
        const cssWidth = Math.floor(viewport.width / pixelRatio);
        const cssHeight = Math.floor(viewport.height / pixelRatio);
        const offscreen = document.createElement('canvas');
        const offscreenCtx = offscreen.getContext('2d');

        offscreen.width = Math.floor(viewport.width);
        offscreen.height = Math.floor(viewport.height);
        offscreenCtx.fillStyle = '#fff';
        offscreenCtx.fillRect(0, 0, offscreen.width, offscreen.height);

        await page.render({
          canvasContext: offscreenCtx,
          viewport: viewport
        }).promise;

        if (renderGeneration !== generation) return null;

        const source = window.createImageBitmap
          ? await createImageBitmap(offscreen)
          : offscreen;
        const cached = {
          pageNum,
          source,
          width: offscreen.width,
          height: offscreen.height,
          cssWidth,
          cssHeight
        };

        pageCache.set(key, cached);
        trimPageCache();
        return cached;
      })();

      pendingRenders.set(key, renderPromise);

      try {
        return await renderPromise;
      } catch (e) {
        if (e.name !== 'RenderingCancelledException') {
          console.error('Render error:', e);
          alert('Error rendering page: ' + e.message);
        }
        return null;
      } finally {
        pendingRenders.delete(key);
      }
    }

    function drawCachedPage(cached) {
      if (!cached) return;

      canvas.width = cached.width;
      canvas.height = cached.height;
      canvas.style.width = cached.cssWidth + 'px';
      canvas.style.height = cached.cssHeight + 'px';
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(cached.source, 0, 0);
    }

    async function renderPage(pageNum) {
      const cached = await renderPageToCache(pageNum);
      if (pageNum !== currentPage) return;

      drawCachedPage(cached);
      preRenderAdjacentPages();
    }

    function preRenderAdjacentPages() {
      requestAnimationFrame(() => {
        if (totalPages <= smallScorePageLimit) {
          for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
            if (pageNum !== currentPage) renderPageToCache(pageNum);
          }
          return;
        }

        [
          currentPage + 1,
          currentPage - 1,
          currentPage + 2,
          currentPage - 2,
          currentPage + 3,
          currentPage - 3
        ].forEach(pageNum => renderPageToCache(pageNum));
      });
    }

    function clearPageCache() {
      generation++;

      for (const cached of pageCache.values()) {
        if (cached.source && cached.source.close) cached.source.close();
      }
      pageCache.clear();
      pendingRenders.clear();
    }

    async function goToPage(pageNum) {
      if (!pdfDoc || pageNum < 1 || pageNum > totalPages || pageNum === currentPage) return;

      currentPage = pageNum;
      const cached = pageCache.get(getCacheKey(currentPage));
      if (cached) {
        drawCachedPage(cached);
        preRenderAdjacentPages();
      } else {
        renderPage(currentPage);
      }
      showIndicator();
    }

    function nextPage() {
      if (currentPage < totalPages) {
        goToPage(currentPage + 1);
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        goToPage(currentPage - 1);
      }
    }

    function handleTap(e) {
      const x = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
      const w = window.innerWidth;
      if (x < w * 0.2) prevPage();
      else if (x > w * 0.8) nextPage();
      else showIndicator();
    }

    openButton.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      loading.style.display = 'block';
      openScreen.style.display = 'none';

      try {
        const arrayBuffer = await file.arrayBuffer();
        pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        totalPages = pdfDoc.numPages;
        currentPage = 1;
        clearPageCache();

        await renderPage(currentPage);
        viewer.style.display = 'block';
        closeBtn.classList.add('visible');
        showIndicator();
      } catch (err) {
        console.error('PDF load error:', err);
        alert('Error loading PDF: ' + err.message);
        openScreen.style.display = 'flex';
      }

      loading.style.display = 'none';
    });

    let touchStartX = 0;
    let moved = false;
    let lastTouchTapTime = 0;

    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        moved = false;
      }
    }, { passive: true });

    canvas.addEventListener('touchmove', e => {
      if (e.touches.length === 1 && Math.abs(e.touches[0].clientX - touchStartX) > 10) {
        moved = true;
      }
    }, { passive: true });

    canvas.addEventListener('touchend', e => {
      if (!moved) {
        lastTouchTapTime = Date.now();
        e.preventDefault();
        handleTap(e);
      }
    });

    canvas.addEventListener('click', e => {
      if (Date.now() - lastTouchTapTime < 700) {
        e.preventDefault();
        return;
      }
      handleTap(e);
    });

    const closeBtn = document.getElementById('close-btn');

    function showIndicator() {
      pageIndicator.textContent = `Page ${currentPage} of ${totalPages}`;
      pageIndicator.classList.add('visible');
      closeBtn.classList.add('visible');
      clearTimeout(window.indicatorTimer);
      window.indicatorTimer = setTimeout(() => {
        pageIndicator.classList.remove('visible');
        closeBtn.classList.remove('visible');
      }, 2000);
    }

    function closeViewer() {
      clearPageCache();
      viewer.style.display = 'none';
      closeBtn.classList.remove('visible');
      openScreen.style.display = 'flex';
      pdfDoc = null;
      canvas.width = 0;
      canvas.height = 0;
      fileInput.value = '';
    }

    closeBtn.addEventListener('click', closeViewer);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && pdfDoc) {
        e.preventDefault();
        closeViewer();
      }
      else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
    });

    window.addEventListener('resize', () => {
      if (pdfDoc) {
        clearPageCache();
        renderPage(currentPage);
      }
    });
  </script>
</body>
</html>
